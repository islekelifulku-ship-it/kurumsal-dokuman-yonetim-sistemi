    <div class="sidebar-user">

    </div>

  <main class="main-content">
    <header class="page-header">
      <div><h1 class="page-title">Sistem Aktivite Logları</h1><p class="page-subtitle">Sistemdeki en son 100 işlem ve değişiklik</p></div>
    </header>

    <div class="filter-bar">
      <input type="text" id="logSearch" class="search-input" placeholder="İşlem veya Kişi ara..." />
    </div>

    <div class="table-container">
      <table class="data-table">
        <thead>
          <tr>
            <th>Tarih</th>
            <th>Kullanıcı</th>
            <th>İşlem (Action)</th>
            <th>Modül</th>
            <th>Detay</th>
          </tr>
        </thead>
        <tbody id="logsTableBody">
          <tr><td colspan="5" class="table-empty">Yükleniyor...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    requireAuth();
    if(localStorage.getItem('role') !== 'Yönetici') {
        window.location.href = 'dashboard.html';
    }
    renderSidebar();

    let allLogs = [];

    async function loadLogs() {
      try {
        allLogs = await Api.get('/api/AuditLogs');
        renderLogs();
      } catch (err) {
        document.getElementById('logsTableBody').innerHTML = '<tr><td colspan="5" class="table-error">Loglar yüklenemedi.</td></tr>';
      }
    }

    function renderLogs() {
      const q = document.getElementById('logSearch').value.toLowerCase();
      const tbody = document.getElementById('logsTableBody');
      
      const filtered = allLogs.filter(l => 
        (l.userName || '').toLowerCase().includes(q) ||
        (l.action || '').toLowerCase().includes(q) ||
        (l.details || '').toLowerCase().includes(q)
      );

      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="table-empty">Kayıt bulunamadı</td></tr>';
        return;
      }

      tbody.innerHTML = filtered.map(l => {
        let actionColor = 'var(--text-main)';
        if(l.action.includes('DELETE') || l.action.includes('SİL')) actionColor = 'var(--error)';
        if(l.action.includes('CREATE') || l.action.includes('YENİ')) actionColor = 'var(--success)';
        if(l.action.includes('UPDATE') || l.action.includes('GÜNCELLE')) actionColor = 'var(--warning)';

        return `
          <tr>
            <td>${new Date(l.createdAt).toLocaleString('tr-TR')}</td>
            <td><strong>${escHtml(l.userName)}</strong></td>
            <td style="color:${actionColor}; font-weight:600;">${escHtml(l.action)}</td>
            <td>${escHtml(l.entityName)}</td>
            <td>${escHtml(l.details)}</td>
          </tr>
        `;
      }).join('');
    }

    document.getElementById('logSearch').addEventListener('input', renderLogs);
    loadLogs();
  </script>
</body>
</html>
