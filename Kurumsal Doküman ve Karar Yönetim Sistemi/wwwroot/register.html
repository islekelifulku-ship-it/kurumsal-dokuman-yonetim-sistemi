<!DOCTYPE html>
<html lang="tr">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kayıt Ol – KDKYS</title>
  <meta name="description" content="Yeni hesap oluşturarak sisteme katılın." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-body">

  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>

  <div class="auth-container">
    <div class="auth-card">

      <div class="auth-brand">
        <div class="auth-logo">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <rect width="40" height="40" rx="12" fill="url(#logoGrad2)"/>
            <path d="M10 14h20M10 20h14M10 26h18" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="30" cy="26" r="5" fill="white" opacity="0.9"/>
            <path d="M28 26l1.5 1.5L32 24" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="logoGrad2" x1="0" y1="0" x2="40" y2="40">
                <stop offset="0%" stop-color="#6366f1"/>
                <stop offset="100%" stop-color="#8b5cf6"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div>
          <h1 class="auth-title">KDKYS</h1>
          <p class="auth-subtitle">Kurumsal Doküman ve Karar Yönetim Sistemi</p>
        </div>
      </div>

      <h2 class="auth-heading">Hesap Oluştur</h2>
      <p class="auth-desc">Sisteme kayıt olarak hemen başlayın</p>

      <div id="registerAlert" class="alert hidden"></div>

      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label for="name">Ad Soyad</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="name" placeholder="Adınız Soyadınız" required />
          </div>
        </div>

        <div class="form-group">
          <label for="regEmail">E-posta Adresi</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input type="email" id="regEmail" placeholder="ornek@sirket.com" required />
          </div>
        </div>

        <div class="form-group">
          <label for="role">Rol</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
            </svg>
            <select id="role" required>
              <option value="">Rol Seçin</option>
              <option value="Personel">Personel</option>
              <option value="Yönetici">Yönetici</option>
              <option value="Departman Sorumlusu">Departman Sorumlusu</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="regPassword">Şifre</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="regPassword" placeholder="En az 6 karakter" required minlength="6" />
          </div>
        </div>

        <button type="submit" id="registerBtn" class="btn btn-primary btn-full">
          <span id="registerBtnText">Kayıt Ol</span>
          <div id="registerSpinner" class="btn-spinner hidden"></div>
        </button>
      </form>

      <div class="auth-divider"><span>veya</span></div>

      <p class="auth-register-link">
        Zaten hesabınız var mı? <a href="index.html">Giriş Yapın</a>
      </p>

    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      const txt = document.getElementById('registerBtnText');
      const spinner = document.getElementById('registerSpinner');
      const alertEl = document.getElementById('registerAlert');

      btn.disabled = true;
      txt.textContent = 'Kayıt yapılıyor...';
      spinner.classList.remove('hidden');
      alertEl.classList.add('hidden');

      try {
        await Api.register({
          name: document.getElementById('name').value,
          email: document.getElementById('regEmail').value,
          role: document.getElementById('role').value,
          passwordHash: document.getElementById('regPassword').value
        });
        alertEl.textContent = '✓ Kayıt başarılı! Giriş sayfasına yönlendiriliyorsunuz...';
        alertEl.className = 'alert alert-success';
        setTimeout(() => window.location.href = 'index.html', 1500);
      } catch (err) {
        alertEl.textContent = err.message || 'Kayıt başarısız.';
        alertEl.className = 'alert alert-error';
        btn.disabled = false;
        txt.textContent = 'Kayıt Ol';
        spinner.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
